<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Miguel</title>

    <script defer>
        const array = []

        function enviar() {
            const input = document.querySelector("#idinput")
            const texto = document.querySelector("#idparag")
            const valor = input.value

            if (valor !== '') {
                array.push(valor)

                texto.innerHTML = valor + "<br>" + texto.innerHTML

                console.log(array)
            }

            input.value = ''
        }

        function volta() {
            const input = document.querySelector("#idinput")
            const texto = document.querySelector("#idparag")

            if (array.length > 0) {
                const ultimo = array.pop()
                input.value = ultimo

                texto.innerHTML = ""

                for (let i = array.length - 1; i >= 0; i--) {
                    texto.innerHTML += array[i] + "<br>"
                }
                console.log(array)
            }
        }
    </script>
    <style>
        body {
            background-color: rgb(255, 255, 255);
            font-family: sans-serif;
            font-size: 26px;
            width: 600px;
            margin: auto;
            text-align: center;
            border: #000000 solid 3px;
            padding: 20px;
        }

        input {
            width: 100%;
            height: 35px;
            padding: 5px;
        }

        .botao {
            background-color: #757575;
            font-weight: bold;
            color: white;
            height: 35px;
            margin: 10px 5px;
            padding: 5px 10px;
            border: 0px;
        }

        .botao:hover {
            background-color: #413f3f;
        }

    </style>
</head>
<body>

    <h1>Digite algo</h1>

    <input type="text" id="idinput">
    <button class="botao" onclick="enviar()">Copiar em baixo</button>
    <button class="botao" onclick="volta()">Voltar</button>

    <p id="idparag"></p>

</body>
</html>
